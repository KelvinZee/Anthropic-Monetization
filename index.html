const UserShiftSection = () => <section className="px-6 md:px-12 lg:px-20 py-24 border-t border-anthro-border"><div className="max-w-6xl mx-auto"><SectionHeader num="06" label="The User Shift" title="Users are moving from choosing software to specifying the workflow they want software to run." lead="The sharper consumer shift is not chat to agent. It is customer-specific software: a user describes the workflow, Claude helps build the tool, and the product has to make hosting, governance, support, and cost understandable before the result can replace rented software."/><div className="grid lg:grid-cols-[1.1fr_0.9fr] gap-10 mb-14"><div className="space-y-5 font-body text-base md:text-lg text-anthro-body leading-relaxed"><p>The early LLM habit was simple: ask a question, get an answer, and decide whether the answer was useful. The next habit is more structural: describe a workflow, generate the first interface or code, connect the right data, deploy the result, and decide whether it can run as part of a real operating system.</p><p>This is where the SaaS spend thesis becomes more specific. Customers do not only pay SaaS vendors for features. They pay for the bundled operating layer: hosting, auth, permissions, integrations, uptime, support, billing, admin controls, and a roadmap they do not have to maintain. Claude can redirect part of that spend only if the product helps customers build the tool and makes the run layer visible enough to trust.</p><p>Anthropic’s public products make the build side plausible without proving the full build-and-run thesis. Claude Code gives users a path from intent to code, while Claude Design moves earlier in the funnel by turning ideas into prototypes, slides, one-pagers, and visual work. The harder product question is what happens after the first useful build: where it runs, who owns it, how it is updated, and what the customer pays for over time.</p><p>I would not frame this as “all SaaS goes away.” The stronger claim is narrower: workflow-specific jobs may move from rented software to customer-specific tools when custom fit matters more than packaged breadth, and when Anthropic can own, bundle, or partner for enough of the runtime boundary.</p></div><Card className="h-fit"><Eyebrow className="mb-5 text-anthro-accent">What changes about the customer job</Eyebrow>{[['Spend pool','The question becomes which monthly, annual, per-seat, or services spend could become Claude usage, hosted-tool subscription, agent operation, or enterprise governance spend.'],['Build-and-run path','The product has to carry the user from workflow description to prototype, code, deployment, monitoring, support, and repeated operation.'],['Ownership split','The customer needs to know what Anthropic owns, what a partner owns, what the customer owns, and where responsibility moves when the tool fails.'],['Product translation','The role is to translate emerging capability into a customer-facing build-and-run path: workflow → tool → runtime → governance → spend capture.']].map(([h,b])=><div key={h} className="py-5 border-t border-anthro-border first:border-t-0 first:pt-0 last:pb-0"><div className="font-display text-lg text-anthro-primary mb-2">{h}</div><p className="text-sm text-anthro-muted leading-relaxed">{b}</p></div>)}</Card></div><div className="bg-anthro-border border border-anthro-border mb-12">{USER_SHIFT_ROWS.map(row=><div key={row.shift} className="grid lg:grid-cols-[1fr_1fr_1.2fr_1.4fr] bg-anthro-surface border-b-2 lg:border-b border-anthro-border last:border-b-0 print-row"><div className="p-5 lg:border-r border-anthro-border"><Eyebrow className="mb-2">Shift</Eyebrow><div className="font-display text-base text-anthro-primary">{row.shift}</div></div><div className="p-5 lg:border-r border-anthro-border"><Eyebrow className="mb-2">Old expectation</Eyebrow><p className="text-sm text-anthro-muted">{row.old}</p></div><div className="p-5 lg:border-r border-anthro-border"><Eyebrow className="mb-2">New expectation</Eyebrow><p className="text-sm text-anthro-body">{row.next}</p></div><div className="p-5"><Eyebrow className="mb-2">What Claude has to make legible</Eyebrow><p className="text-sm text-anthro-body">{row.legible}</p></div></div>)}</div><div className="bg-anthro-surface border border-anthro-border p-8 mb-10"><Eyebrow className="mb-5 text-anthro-warning">What I would not claim</Eyebrow><div className="grid md:grid-cols-2 gap-4">{USER_SHIFT_NOT_CLAIM.map(item=><div key={item} className="text-sm text-anthro-body flex gap-3"><X size={14} className="mt-1 text-anthro-warning flex-shrink-0"/><span>{item}</span></div>)}</div></div><PullQuote>The user shift is from renting generalized software to asking whether Claude can help create the narrower tool and package enough of the run layer for that tool to be trusted. Spend moves only if build, hosting, permissions, support, and cost become understandable in one product promise.</PullQuote></div></section>;

    'I would not build first-party runtime infrastructure before testing whether a Supabase/Vercel-style partner path can carry the early wedge.',
    'I would not optimize for broad platform breadth in the first 90 days. I would pick one workflow where spend, switching friction, and runtime boundary are visible.'
  ];

  return <section className="px-6 md:px-12 lg:px-20 py-24 border-t border-anthro-border">
    <div className="max-w-6xl mx-auto">
      <SectionHeader
        num="11"
        label="First 90 Days"
        title="The first 90 days should prove the runtime boundary before scaling the build-and-run promise."
        lead="I would not start by naming a platform roadmap from the outside. I would start by finding the workflow wedge, the runtime owner, the trust package, and the spend signal that would justify a Claude-centered build-and-run subscription."

      <div className="grid md:grid-cols-3 gap-px bg-anthro-border border border-anthro-border mb-10">
        {phases.map((phase) => <Card key={phase.era}>
          <Eyebrow className="mb-4 text-anthro-accent">{phase.era}</Eyebrow>
          <h3 className="font-display text-xl text-anthro-primary mb-3">{phase.title}</h3>
          <p className="text-sm text-anthro-muted leading-relaxed mb-5">{phase.goal}</p>
          <ul className="space-y-3 text-sm text-anthro-body mb-6">
            {phase.items.map((item) => <li key={item} className="flex gap-2 leading-relaxed">
              <Check size={14} className="mt-1 text-anthro-accent flex-shrink-0"/>

        </Card>)}
      </div>

      <Card>
        <Eyebrow className="mb-5 text-anthro-warning">What I would not do</Eyebrow>
        <div className="grid md:grid-cols-2 gap-4 text-sm text-anthro-body">
          {notDo.map((item) => <div key={item} className="flex gap-3 leading-relaxed">
            <X size={14} className="mt-1 text-anthro-warning flex-shrink-0"/>
            <span>{item}</span>

        </div>
      </Card>

  </section>;
};

const OpenQuestionsSection = () => { const groups=[['About the data I cannot see externally',['Which workflows have the strongest repeat behavior after the first successful tool build?','Where do users abandon between prototype, code handoff, deployment, and repeated use?','Which plan upgrades are driven by usage volume versus tool-building workflows?','Which support contacts are really product signals around build, deploy, cost, memory, and permissions?']],['About product strategy',['Which SaaS-like workflows does Anthropic want Claude to be credible for over the next year?','Where should Claude act as a destination builder versus an embedded workflow layer?','How much should the consumer product explain model choice, usage, memory, deployment, and tools?','Which research capabilities are close enough to consumer reliability to test externally?']],['About operating model',['How are research capability signals translated into consumer product bets today?','What is the decision cadence for 0-to-1 consumer bets?','Where do safety, policy, product, and infrastructure teams disagree most often on consumer scope?','What telemetry is trusted enough to make roadmap decisions around repeat behavior, trust, cost, support, and upgrade intent?']]]; return <section className="px-6 md:px-12 lg:px-20 py-24 border-t border-anthro-border"><div className="max-w-6xl mx-auto"><SectionHeader num="12" label="Open Questions" title="These are the questions I would need Anthropic’s internal data to answer." lead="The outside evidence is enough to form hypotheses, not enough to defend a roadmap. These questions would change my read on segmentation, product sequencing, trust design, and the operating model."/><div className="grid md:grid-cols-3 gap-px bg-anthro-border border border-anthro-border">{groups.map(([g,qs])=><Card key={g}><Eyebrow className="mb-5 text-anthro-accent">{g}</Eyebrow><ol className="space-y-4 text-sm text-anthro-body list-decimal list-inside">{qs.map(q=><li key={q}>{q}</li>)}</ol></Card>)}</div><PullQuote>These open questions are part of the work, not a substitute for a point of view. I have high confidence that Claude is entering a build-and-legibility phase. I have lower confidence on sequencing until internal behavior, cost, and trust data are visible.</PullQuote></div></section> };

const KelvinBridge = () => <section className="px-6 md:px-12 lg:px-20 py-24 border-t border-anthro-border"><div className="max-w-6xl mx-auto"><SectionHeader num="13" label="Why This Profile" title="Three prior transitions map to the role’s core work: turning complex capability into trusted, repeatable consumer behavior." lead="I am not positioning myself as the deepest model-research PM or former AI consumer founder Anthropic will meet. The relevant pattern in my background is building novel consumer products and operating systems where complex value had to become understandable, repeatable, and commercially useful."/><div className="grid md:grid-cols-3 gap-px bg-anthro-border border border-anthro-border mb-12">{CAREER_ARCS.map(card=><Card key={card.company+card.era}><Eyebrow className="mb-4">{card.era}</Eyebrow><div className="font-display text-2xl text-anthro-primary mb-1">{card.company}</div><div className="font-mono text-xs text-anthro-muted mb-5">{card.role}</div><p className="italic text-anthro-accent text-sm mb-5">{card.relevance}</p><ul className="space-y-2 text-sm text-anthro-body mb-6">{card.wins.map(w=><li key={w}>· {w}</li>)}</ul><div className="pt-5 border-t border-anthro-border text-sm text-anthro-muted italic">{card.tieIn}</div></Card>)}</div><div className="grid md:grid-cols-2 gap-10"><div><Eyebrow className="mb-4">Oct 2023 – Present</Eyebrow><h3 className="font-display text-2xl text-anthro-primary mb-4">Independent study and career break</h3><p className="text-anthro-body mb-4">I stepped away from full-time work to support family through significant health challenges. That caregiving period has stabilized, and I am returning to full-time product leadership with a clearer view of the work I want to do next: products where new technology has to become useful, trusted, and understandable for real people.</p><p className="text-anthro-body">In parallel, I built hands-on fluency with Claude Code, Claude Cowork, Codex, ChatGPT, Gemini, and modern LLM workflows. The useful part was not becoming a full-time engineer. It was learning where these tools feel ready, where they break, and how much product judgment still matters when the model can generate the first draft.</p></div><div><Eyebrow className="mb-4">What I would not claim</Eyebrow><p className="text-anthro-body mb-4">I am not the deepest frontier-model PM, research PM, or former AI consumer founder Anthropic will interview. I would not claim that telecom, Prime, or billing systems map literally to AI inference, model behavior, or safety review. I would not claim my incumbent operating experience maps cleanly to hypergrowth tempo: Anthropic tripled run-rate in four months, and the review rhythms, decision rights, and compute gating problems at that pace are different in kind from anywhere I have worked.</p><p className="text-anthro-body">What I have lived is the adjacent consumer-scale problem: novel products become durable only when customers understand the value, trust the rules, and repeat the behavior often enough for the economics to work. The bet is whether that experience, paired with hands-on AI tooling fluency, helps Anthropic translate research capability into shipped consumer products without losing trust, legibility, or operating discipline.</p></div></div></div></section>;
