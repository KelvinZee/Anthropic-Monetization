    validate: 'Internal cohort analysis: model what current Team Standard and Team Premium customers would pay under three pricing scenarios (current per-seat, hybrid seat-plus-consumption, pure consumption). Customer development with finance-team buyers about how they actually budget AWS and Snowflake today and whether they would budget Claude the same way. Pilot a consumption-shaped add-on to Team Premium for a small cohort, measure 12-month renewal and ARPU. Critically: this should not be tested until hypothesis C has built the consumption-legibility surface that lets customers see what they would be charged.',
    confidence: 'High as a structural diagnosis (per-seat is genuinely mismatched to workload-shaped consumption). Medium as a near-term move (the transition is hard to execute without bill-shock risk). Low as a 2026-2027 ship target (the data infrastructure to calibrate correctly does not yet exist publicly, which is why this hypothesis is structurally downstream of hypothesis C).',

];

// Pure function: takes a buyer and a workflow, returns four metrics + five-stage flow + verdict reference
const computeOutcome = (buyer, workflow) => {
  const readiness     = Math.round((workflow.aiSuit * buyer.buildCapacity) / 100);
  const stackCoverage = Math.min(100, Math.max(0, buyer.stackTolerance + (100 - workflow.stackComplex)));
  const packagingFit  = PACKAGING_FIT[buyer.budgetShape][workflow.consumptionShape];
  const trustSafety   = Math.max(0, 100 - Math.max(0, workflow.complianceReq - buyer.complianceCapacity));

  // Five-stage flow: Describe → Generate → Deploy → Run → Monitor
  const stages = [];

  // Describe — always first-party
  stages.push({
    label: 'Describe',
    status: 'first-party',
    detail: buyer.id === 'individual' ? 'Claude.ai chat' : 'Cowork or Code'
  });

  // Generate — depends on AI suitability
  if (workflow.aiSuit >= 70) {
    stages.push({ label: 'Generate', status: 'first-party', detail: 'Claude Code or Cowork' });
  } else if (workflow.aiSuit >= 50) {
    stages.push({ label: 'Generate', status: 'partner', detail: 'Capable, with limits' });
  } else {
    stages.push({ label: 'Generate', status: 'unsupported', detail: 'Capability gap' });
  }

  // Deploy — workflow stack complexity AND buyer compliance need
  if (workflow.complianceReq >= 80 && buyer.id !== 'enterprise') {
    stages.push({ label: 'Deploy', status: 'unsupported', detail: 'No compliant path' });
  } else if (workflow.complianceReq >= 80) {
    stages.push({ label: 'Deploy', status: 'partner', detail: 'Vertical contract' });
  } else if (workflow.stackComplex <= 35) {
    stages.push({ label: 'Deploy', status: 'first-party', detail: 'Self-host or share-link' });
  } else if (workflow.stackComplex <= 70) {
    stages.push({ label: 'Deploy', status: 'partner', detail: 'Vercel marketplace' });
  } else {
    stages.push({ label: 'Deploy', status: 'partner', detail: 'Vercel + custom' });
  }

  // Run — depends on stack coverage and compliance
  if (workflow.complianceReq >= 80 && buyer.id !== 'enterprise') {
    stages.push({ label: 'Run', status: 'unsupported', detail: 'Compliance gap' });
  } else if (stackCoverage >= 80) {
    stages.push({ label: 'Run', status: 'first-party', detail: 'Anthropic + partner' });
  } else if (stackCoverage >= 55) {
    stages.push({ label: 'Run', status: 'partner', detail: 'Supabase + Vercel' });
  } else {
    stages.push({ label: 'Run', status: 'unsupported', detail: 'Stack gap' });
  }

  // Monitor — compliance-aware
  if (workflow.complianceReq >= 80) {
    stages.push({
      label: 'Monitor',
      status: buyer.id === 'enterprise' ? 'partner' : 'unsupported',
      detail: buyer.id === 'enterprise' ? 'Vertical audit' : 'No audit trail'
    });
  } else if (buyer.id === 'enterprise') {
    stages.push({ label: 'Monitor', status: 'partner', detail: 'Enterprise dashboard' });
  } else {
    stages.push({ label: 'Monitor', status: 'partner', detail: 'Partial: caps only' });
  }

  return { readiness, stackCoverage, packagingFit, trustSafety, stages };
};

const FlowDiagram = ({ stages }) => {
  const STATUS_FILL = { 'first-party': '#d97757', 'partner': '#faf9f5', 'diy': '#faf9f5', 'unsupported': '#6a9bcc' };
  const STATUS_STROKE = { 'first-party': '#d97757', 'partner': '#807e77', 'diy': '#b0aea5', 'unsupported': '#6a9bcc' };
  const STATUS_TEXT = { 'first-party': '#faf9f5', 'partner': '#141413', 'diy': '#6b6862', 'unsupported': '#faf9f5' };
  const STATUS_LABEL = { 'first-party': '#d97757', 'partner': '#807e77', 'diy': '#b0aea5', 'unsupported': '#6a9bcc' };
  return (
    <div className="border border-stone-800/60 bg-stone-900 p-6 overflow-x-auto">
      <svg viewBox="0 0 1000 230" className="w-full" style={{ minWidth: '600px' }} preserveAspectRatio="xMidYMid meet">
        {stages.map((s, i) => {
          const x = 100 + i * 200;
          return (
            <g key={i}>
              {i < stages.length - 1 && (
                <line x1={x + 22} y1={50} x2={x + 178} y2={50} stroke="#e8e6dc" strokeWidth="1" />
              )}
              <circle cx={x} cy={50} r={20} fill={STATUS_FILL[s.status]} stroke={STATUS_STROKE[s.status]} strokeWidth="1.5" />
              <text x={x} y={55} textAnchor="middle" fill={STATUS_TEXT[s.status]} fontSize="13" fontFamily="Poppins, sans-serif" fontWeight="600">{i + 1}</text>
              <text x={x} y={92} textAnchor="middle" fill="#141413" fontSize="11" fontFamily="Poppins, sans-serif" fontWeight="500" letterSpacing="1.5">{s.label.toUpperCase()}</text>
              <text x={x} y={108} textAnchor="middle" fill={STATUS_LABEL[s.status]} fontSize="9" fontFamily="JetBrains Mono, monospace" letterSpacing="1">{s.status}</text>
              <foreignObject x={x - 85} y={120} width="170" height="100">
                <div xmlns="http://www.w3.org/1999/xhtml" style={{ fontSize: '11px', color: '#6b6862', fontFamily: "'Lora', Georgia, serif", textAlign: 'center', lineHeight: '1.4' }}>
                  {s.detail}
                </div>
              </foreignObject>
            </g>
          );
        })}
      </svg>
    </div>
  );
};

const DisplacementProbe = () => {
  const [buyerIdx, setBuyerIdx]       = useState(2); // default Midsize
  const [workflowIdx, setWorkflowIdx] = useState(0); // default Internal dashboard

  const buyer    = BUYER_PROFILES[buyerIdx];
  const workflow = WORKFLOW_PROFILES[workflowIdx];
  const verdict  = VERDICTS[buyerIdx][workflowIdx];

  const outcome = useMemo(() => computeOutcome(buyer, workflow), [buyerIdx, workflowIdx]);

  // Verdict border color by template — A/F orange, B/C accent variants, D/E warning
  const verdictBorder = (verdict.template === 'D' || verdict.template === 'E' || verdict.template === 'B')
    ? 'border-warning/60' : 'border-accent/60';
  const verdictTone = (verdict.template === 'D' || verdict.template === 'E' || verdict.template === 'B')
    ? 'text-warning' : 'text-accent';

  return (
    <section className="grain-overlay relative border-t border-stone-800/60 py-24 md:py-32 px-6 md:px-12 lg:px-20 max-w-7xl mx-auto">
      <SectionHeader
        num="09"
        label="Probe"
        title="A two-axis sandbox for which buyer × workflow combinations are displacement-ready under current Anthropic architecture, and which need either packaging change, partner work, or capability progress before they move."
        lead="Pick a buyer segment and a workflow category. The metrics, the build-and-run flow, and the verdict update together. The intent is to make the structural argument from §06 and §07 tangible: where displacement runs, where it stalls, and what would unblock it."
      />

      {/* Selectors */}
      <div className="space-y-6 mb-8">
        <div>
          <div className="font-mono text-[10px] tracking-widest uppercase text-stone-400 mb-3">Buyer segment</div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-px bg-stone-800/60 border border-stone-800/60">
            {BUYER_PROFILES.map((b, i) => (
              <button
                key={b.id}
                onClick={() => setBuyerIdx(i)}
                className={`bg-stone-900 p-4 text-left transition-colors hover:bg-stone-850 ${i === buyerIdx ? 'ring-inset-emerald' : ''}`}
              >
                <div className={`font-display text-base ${i === buyerIdx ? 'text-accent' : 'text-stone-100'}`}>{b.label}</div>
              </button>
            ))}
          </div>
        </div>
        <div>
          <div className="font-mono text-[10px] tracking-widest uppercase text-stone-400 mb-3">Workflow category</div>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-px bg-stone-800/60 border border-stone-800/60">
            {WORKFLOW_PROFILES.map((w, i) => (
              <button
                key={w.id}
                onClick={() => setWorkflowIdx(i)}
                className={`bg-stone-900 p-4 text-left transition-colors hover:bg-stone-850 ${i === workflowIdx ? 'ring-inset-emerald' : ''}`}
              >
                <div className={`font-display text-base ${i === workflowIdx ? 'text-accent' : 'text-stone-100'}`}>{w.label}</div>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Caveat */}
      <p className="font-mono text-[10px] tracking-widest uppercase text-stone-500 mb-12 max-w-3xl">
        Coefficients are illustrative, calibrated against external comparables. Calibration in production would replace these with real telemetry.
      </p>

      {/* Two-column main: metrics on the left, flow on the right */}
      <div className="grid md:grid-cols-2 gap-10 mb-12">
        {/* Metrics */}
        <div>
          <div className="font-mono text-xs tracking-widest uppercase text-accent mb-6 flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-accent" />
            Metrics
          </div>
          <div className="space-y-7">
            <MetricBar label="Displacement readiness" value={outcome.readiness} />
            <MetricBar label="Hidden stack coverage" value={outcome.stackCoverage} />
            <MetricBar label="Packaging fit" value={outcome.packagingFit} />
            <MetricBar label="Trust safety" value={outcome.trustSafety} />
          </div>
        </div>
        {/* Flow */}
        <div>
          <div className="font-mono text-xs tracking-widest uppercase text-accent mb-6 flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-accent" />
            Build-and-run flow
          </div>
          <FlowDiagram stages={outcome.stages} />
        </div>
      </div>

      {/* Verdict */}
      <div className={`max-w-3xl border-l-2 pl-5 py-1 ${verdictBorder}`}>
        <div className={`font-mono text-[10px] tracking-widest uppercase mb-3 flex items-center gap-2 ${verdictTone}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${verdict.template === 'D' || verdict.template === 'E' || verdict.template === 'B' ? 'bg-warning' : 'bg-accent'}`} />
          Verdict · Template {verdict.template} · {verdict.title}
        </div>
        <p className="font-body text-stone-200 text-base leading-relaxed">
          {verdict.text}
        </p>
      </div>
    </section>
  );
};
